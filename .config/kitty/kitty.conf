color15 #ffffff

#: white

mark1_foreground black

#: Color para marcas de tipo 1

mark1_background #98d3cb

#: Color para marcas de tipo 1 (azul acero claro)

mark2_foreground black

#: Color para marcas de tipo 2

mark2_background #f2dcd3

