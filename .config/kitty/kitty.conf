#: AVANZADO {{{

shell .
#: El programa shell a ejecutar. El valor predeterminado de . significa usar
#: cualquier shell que esté configurado como shell predeterminado para el usuario actual
#: tenga en cuenta que en macOS si cambia esto, es posible que deba agregar
#: --login y --interactive para asegurarse de que el shell comience en
#: modo interactivo y lee sus archivos rc de inicio

editor .

#: El editor de terminal (como ``vim`` o ``nano``) para usar al editar el archivo
#: de configuración de kitty o tareas similares.
#: el valor predeterminado de . medios para usar las variables de entorno
#: VISUAL y EDITOR en ese orden. Si estas variables no están configuradas,
#: kitty ejecutará su shell (``$SHELL -l -i -c env``) para ver si los archivos
#: de configuración de su shell están configurados como VISUAL o EDITOR. Si eso no funciona,
#: kitty recorrerá varios editores conocidos (``vim``, ``emacs``,
#: etc) y tome el primero que exista en su sistema.

close_on_child_death no
#: Cierra la ventana cuando el proceso hijo (shell) sale. Si no (el valor predeterminado)
#: la terminal permanecerá abierta cuando el niño salga como siempre que haya procesos que
#: se envíen al terminal (por ejemplo, procesos en segundo plano o en desuso). En caso afirmativo
#: la ventana se cerrará tan pronto como salga el proceso secundario. Tenga en cuenta que
#: configurarlo en sí significa que cualquier proceso en segundo plano que aún use el terminal
#: puede fallar silenciosamente porque su stdout/stderr/stdin ya no funciona.

allow_remote_control no

#: Permitir que otros programas controlen a Kitty. Si activa esto, otros programas pueden
#: controlar todos los aspectos de Kitty, incluido el envío de texto a las ventanas de Kitty
#: la apertura de nuevas ventanas, el cierre de ventanas, la lectura del contenido de las ventanas
#: etc. Tenga en cuenta que esto incluso funciona a través de conexiones ssh. Puede optar por
#: permitir que se ejecute cualquier programa dentro de kitty para controlarlo, con programas sí o
#: solo que se conectan al socket especificado con la opción de línea de comando kitty --listen-on
#: si usa el valor socket-only. Este último es útil si desea evitar que los programas que se
#: ejecutan en una computadora remota a través de ssh controlen a kitty. Recargar la configuración
#: no afectará esta configuración

listen_on none

#: Dile a kitty que escuche el conector unix/tcp especificado para las conexiones de control remoto
#: Tenga en cuenta que esto se aplicará a todas las instancias de gatitos. Puede ser anulado por el
#: indicador de línea de comando kitty --listen-on. Esta opción solo acepta sockets UNIX, como unix:${TEMP}/mykitty
#: o (en Linux) unix:@mykitty. Las variables de entorno se expanden. Si {kitty_pid} está presente, se reemplaza por
#: el PID del proceso kitty; de lo contrario, el PID del proceso kitty se agrega al valor, con un guión. Esta opción
#: se ignora a menos que también configure allow_remote_control para habilitar el control remoto. Consulte la ayuda de
#: kitty --listen-on para obtener más detalles. No se admite cambiar esta opción recargando la configuración.

env

#: especifique las variables de entorno para establecer en todos los procesos secundarios. Nota
#: que las variables de entorno se expanden recursivamente, por lo que si
#: utilizar::
#: env MYVAR1=a
#: env MYVAR2=${MYVAR1}/${HOME}/b
#: El valor de MYVAR2 será a/<ruta al directorio de inicio>/b. Utilizando
#: VAR= lo establecerá en la cadena vacía y usando solo VAR se eliminará
#: la variable del entorno del proceso hijo.

watcher

#: ruta al archivo python que se cargará para
#: https://sw.kovidgoyal.net/kitty/launch/#watchers. Se
#: puede especificar más de una vez para cargar múltiples observadores
#: Los observadores se agregarán a cada ventana de gatito. Las rutas relativas
#: se resuelven en relación con el directorio de configuración de kitty Tenga
#: en cuenta que recargar la configuración solo afectará las ventanas creadas
#: después de la recarga.

exe_search_path

#: Controle dónde mira Kitty para encontrar programas para ejecutar
#: El orden de búsqueda predeterminado es: Primero busque la RUTA de todo el sistema
#: luego ~/.local/bin y ~/bin. Si aún no se encuentra, se prueba la RUTA definida en
#: el shell de inicio de sesión después de obtener todos sus archivos de inicio. Finalmente
#: si está presente, se prueba la RUTA en la opción env. Esta opción le permite anteponer
#: agregar o eliminar rutas de este orden de búsqueda. Se puede especificar varias veces
#: para varias rutas. Se agregará una ruta simple al orden de búsqueda. Se agregará una
#: ruta que comienza con el signo + al orden de búsqueda, después de ~/bin arriba. Una ruta
#: que comience con el signo - se eliminará de todo el orden de búsqueda. Por ejemplo
#:     exe_search_path /some/prepended/path
#:     exe_search_path +/some/appended/path
#:     exe_search_path -/some/excluded/path

update_check_interval 24

#: Comprueba periódicamente si hay disponible una actualización de kitty
#: Si se encuentra una actualización, se muestra una notificación del sistema
#: informándole de la actualización disponible. El valor predeterminado es verificar
#: cada 24 horas, establecer en cero para deshabilitar. No se admite cambiar esta opción
#: recargando la configuración.

startup_session none

#: ruta a un archivo de sesión para usar en todas las instancias de kitty
#: Se puede anular usando la opción de línea de comando kitty --session para
#: instancias individuales. Consulte https://sw.kovidgoyal.net/kitty/overview/startup-sessions
#: en la documentación de kitty para obtener más detalles. Tenga en cuenta que las rutas relativas
#: se interpretan con respecto al directorio de configuración de kitty. Las variables de entorno en
#: la ruta se expanden. No se admite cambiar esta opción recargando la configuración.

clipboard_control write-clipboard write-primary read-clipboard-ask read-primary-ask

#: Permitir que los programas que se ejecutan en kitty lean y escriban desde el portapapeles
#: Puede controlar exactamente qué acciones están permitidas. El conjunto de acciones posibles es:
#: write-clipboard read-clipboard write-primary read-primary read-clipboard-ask read-primary-ask
#: El valor predeterminado es permitir la escritura en el portapapeles y la selección principal y
#: solicitar permiso cuando un programa intenta leer desde el portapapeles. Tenga en cuenta que
#: deshabilitar la confirmación de lectura es un riesgo de seguridad, ya que significa que cualquier
#: programa incluso uno que se ejecute en un servidor remoto a través de SSH, puede leer su portapapeles
#: Véase también clipboard_max_size

clipboard_max_size 64


#: El tamaño máximo (en MB) de los datos de los programas que se ejecutan en kitty que se
#: almacenarán para escribirlos en el portapapeles del sistema. Véase también portapapeles_control
#: Un valor de cero significa que no se aplica ningún límite de tamaño

file_transfer_confirmation_bypass

#: una contraseña, que se puede proporcionar transferencia kitten de archivos para omitir
#: el mensaje de confirmación de la transferencia. Esto solo debe usarse cuando se inician
#: transferencias desde computadoras confiables, a través de redes confiables o transportes encriptados
#: ya que permite que los programas que se ejecutan en la máquina remota lean/escriban en el sistema de
#: archivos local, sin permiso.

allow_hyperlinks yes
shell_integration enabled
term xterm-kitty

#: AJUSTES ESPECÍFICOS DEL OS {{{

#:: wayland_titlebar_color system
linux_display_server auto

#: Keyboard shortcuts {{{

#: para asignar ctrl+a para algo

#: puede usar la acción especial no_op para desasignar un atajo de teclado
#: que se asigna en la configuración por defecto::

#: map kitty_mod+space no_op

#: Si desea que Kitty ignore por completo un evento clave, ni siquiera
#: enviándolo al programa que se ejecuta en la terminal, asígnelo a
#: discard_event::

#: map kitty_mod+f1 discard_event

#: puede combinar varias acciones para que se activen con una sola
#: atajo, usando la siguiente sintaxis::

#: map key combine <separator> action1 <separator> action2 <separator> action3 ...

#: por ejemplo::

#: map kitty_mod+e combine : new_window : next_layout

#: esto creará una nueva ventana y cambiará al diseño siguiente disponible

#: puede usar atajos de teclas múltiples usando la sintaxis que se muestra a continuación:

#: map key1>key2>key3 action

#: por ejemplo ::

#: map ctrl+f>2 set_font_size 20

#: la lista completa de acciones que se pueden asignar a las pulsaciones
#: de teclas estan disponibles aquí </acciones>

kitty_mod ctrl+shift

#: El valor de kitty_mod se usa como modificador para todos los valores predeterminados
#: accesos directos, puede cambiarlo en su kitty.conf para cambiar el
#: modificador para todos los accesos directos predeterminados

clear_all_shortcuts no

#: Puedes hacer que Kitty elimine todas las definiciones de atajos vistas hasta este momento
#: point. Useful,por ejemplo, para eliminar los accesos directos predeterminados

action_alias

#: E.g. action_alias launch_tab launch --type=tab --cwd=current

#: Defina alias para evitar repetir las mismas opciones en múltiples
#: asignaciones Se pueden definir alias para cualquier acción. Los alias son
#: expanded recursively Por ejemplo, el alias anterior le permite
#: crear asignaciones para iniciar una nueva pestaña en el trabajo actual

#:     map f1 launch_tab vim
#:     map f2 launch_tab emacs

#: Del mismo modo, a la invocación de alias kitten

#: action_alias hints kitten hints --hints-offset=0

kitten_alias

#: E.g. kitten_alias hints hints --hints-offset=0

#: Como action_alias anterior pero específicamente para kittens Generalmente,
#: prefiero usar action_alias. Esta opción es una versión heredada,
#: presente para compatibilidad con versiones anteriores Hace que todas las invocaciones de
#: kitten con alias que se sustituirá. Así que el ejemplo anterior será
#: hacer que todas las invocaciones de kitten de hints tengan --hints-
#: opción offset=0 aplicada.

#: Clipboard {{{

#: Copiar al clipboard

map kitty_mod+c copy_to_clipboard

#:: También hay una acción copy_or_interrupt que puede ser opcionalmente
#:: asignado a Ctrl+c. Se copiará sólo si hay una selección y
#:: enviar una interrupción de lo contrario. Similar,
#:: copy_and_clear_or_interrupt copiará y borrará la selección o
#:: envía una interrupción si no hay selección.

#: Pegar desde el portapapeles

map kitty_mod+v paste_from_clipboard

#: Pegar desde la selección

map kitty_mod+s  paste_from_selection
map shift+insert paste_from_selection

#: Pasar selección al programa

map kitty_mod+o pass_selection_to_program

#:: También puede pasar el contenido de la selección actual a cualquier
#:: programa usando pass_selection_to_program. Por defecto, el sistema
#:: se usa el programa abierto, pero puede especificar el suyo propio, la selección
#:: se pasará como argumento de línea de comando al programa, por
#::  ejemplo::

#:: map kitty_mod+o pass_selection_to_program firefox

#:: Puede pasar la selección actual a un programa de terminal que se esté ejecutando
#:: en una nueva ventana de kitty, usando el marcador de posición @selection::

#:: map kitty_mod+y new_window less @selection

#: }}}

#: Desplazamiento {{{

#: Desplazarse hacia arriba

map kitty_mod+up    scroll_line_up
map kitty_mod+k     scroll_line_up
map opt+cmd+page_up scroll_line_up
map cmd+up          scroll_line_up

#: Desplazarse hacia abajo

map kitty_mod+down    scroll_line_down
map kitty_mod+j       scroll_line_down
map opt+cmd+page_down scroll_line_down
map cmd+down          scroll_line_down

#: Desplazarse hacia arriba

map kitty_mod+page_up scroll_page_up
map cmd+page_up       scroll_page_up

#: Desplazarse hacia abajo

map kitty_mod+page_down scroll_page_down
map cmd+page_down       scroll_page_down

#: Desplazarse al inicio

map kitty_mod+home scroll_home
map cmd+home       scroll_home

#: Desplazarse hacia el final

map kitty_mod+end scroll_end
map cmd+end       scroll_end

#: Desplácese al indicador de shell anterior

map kitty_mod+z scroll_to_prompt -1

#:: Use un parámetro de cero para scroll_to_prompt para desplazarse al
#:: último salto o la última posición en la que se hizo clic. Requiere
#:: https://sw.kovidgoyal.net/kitty/shell-integration/ para trabajar

#: Desplácese al siguiente indicador de shell

map kitty_mod+x scroll_to_prompt 1

#: Búfer de desplazamiento hacia atrás del navegador en buscapersonas

map kitty_mod+h show_scrollback

#:: Puede canalizar el contenido de la pantalla actual + búfer de historial
#:: como STDIN a un programa arbitrario usando la función ``launch``.
#:: Por ejemplo lo siguiente abre el búfer de desplazamiento hacia atrás
#:: en less en una ventana superpuesta::

#:: map f1 launch --stdin-source=@screen_scrollback --stdin-add-formatting --type=overlay less +G -R

#:: Para obtener más detalles sobre la canalización de la pantalla y el
#:: contenido del búfer a programas externos, consulte launch

#: Examinar la salida del último comando de shell en pager

map kitty_mod+g show_last_command_output

#:: También puede definir accesos directos adicionales para obtener la
#:: salida del comando. Por ejemplo, para obtener la salida del primer comando en la pantalla

#:: map f1 show_first_command_output_on_screen

#:: Para obtener la salida del comando al que se accedió por última
#:: vez mediante un teclado acción o acción del ratón::

#:: map f1 show_last_visited_command_output

#:: Puede canalizar la salida del último comando ejecutado en el shell
#:: usando la función de lanzamiento. Por ejemplo, lo siguiente abre la
#:: salida en less en una ventana superpuesta::

#:: map f1 launch --stdin-source=@last_cmd_output --stdin-add-formatting --type=overlay less +G -R

#:: Para obtener la salida del primer comando en la pantalla use
#:: @first_cmd_output_on_screen PPara obtener la salida del último comando saltado
#:: use @last_visited_cmd_output

#::  Requiere https://sw.kovidgoyal.net/kitty/shell-integration/ para funcionar

#: }}}

#: Gestión de ventanas {{{

#: nueva ventana

map kitty_mod+enter new_window
map cmd+enter       new_window

#:: Puede abrir una nueva ventana ejecutando un programa arbitrario, por ejemplo

#:: map kitty_mod+y      launch mutt

#:: Puede abrir una nueva ventana con el conjunto de directorios de trabajo actual
#:: al directorio de trabajo de la ventana actual usando

#:: map ctrl+alt+enter    launch --cwd=current

#:: Puede abrir una nueva ventana que puede controlar a Kitty a través de
#:: la instalación de control remoto de kitty anteponiendo la línea de comando
#:: con @. Cualquier programa que se ejecute en esa ventana podrá
#:: controlar a Kitty. Por ejemplo::

#:: map ctrl+enter launch --allow-remote-control some_program

#:: Puede abrir una nueva ventana al lado de la ventana actualmente activa o
#:: como la primera ventana con

#:: map ctrl+n launch --location=neighbor some_program
#:: map ctrl+f launch --location=first some_program

#::Para más detalles, consulte launch.

#: Nueva ventana del OS

map kitty_mod+n new_os_window
map cmd+n       new_os_window

#:: Funciona como new_window above excepto que abre un sistema operativo de nivel superior
#:: ventana kitty. En particular puede usar new_os_window_with_cwd para abrir una
#:: ventana con el directorio de trabajo actual.

#: Cerrar ventana

map kitty_mod+w close_window
map shift+cmd+d close_window

#: Siguiente ventana

map kitty_mod+] next_window

#: ventana previa

map kitty_mod+[ previous_window

#: Mover ventana hacia adelante

map kitty_mod+f move_window_forward

#: Mover ventana hacia atras

map kitty_mod+b move_window_backward

#: Mover ventana al principio

map kitty_mod+` move_window_to_top

#: Empezar a cambiar el tamaño de la ventana

map kitty_mod+r start_resizing_window
map cmd+r       start_resizing_window

#: primera ventana

map kitty_mod+1 first_window
map cmd+1       first_window

#: segunda ventana

map kitty_mod+2 second_window
map cmd+2       second_window

#: tercera ventana

map kitty_mod+3 third_window
map cmd+3       third_window

#: cuarta ventana

map kitty_mod+4 fourth_window
map cmd+4       fourth_window

#: quinta ventana

map kitty_mod+5 fifth_window
map cmd+5       fifth_window

#: sexta ventana

map kitty_mod+6 sixth_window
map cmd+6       sixth_window

#: septima ventana

map kitty_mod+7 seventh_window
map cmd+7       seventh_window

#: octava ventana

map kitty_mod+8 eighth_window
map cmd+8       eighth_window

#: novena ventana

map kitty_mod+9 ninth_window
map cmd+9       ninth_window

#: decima ventana

map kitty_mod+0 tenth_window

#: Seleccione visualmente la ventana de enfoque

map kitty_mod+f7 focus_visible_window

#: Intercambiar ventana visualmente con otra

map kitty_mod+f8 swap_with_window

#: }}}

#: Gestión de pestañas {{{

#: siguiente pestaña

map kitty_mod+right next_tab
map shift+cmd+]     next_tab
map ctrl+tab        next_tab

#: pestaña previa

map kitty_mod+left previous_tab
map shift+cmd+[    previous_tab
map ctrl+shift+tab previous_tab

#: nueva pestaña

map kitty_mod+t new_tab
map cmd+t       new_tab

#: cerrar pestaña

map kitty_mod+q close_tab
map cmd+w       close_tab

#: Cerrar la ventana del OS

map shift+cmd+w close_os_window

#: Mover pestaña hacia adelante

map kitty_mod+. move_tab_forward

#: Mover pestaña hacia atras

map kitty_mod+, move_tab_backward

#: Establecer título de pestaña

map kitty_mod+alt+t set_tab_title
map shift+cmd+i     set_tab_title


#: también puede crear accesos directos para ir a pestañas específicas
#: (siendo 1 la primera) (pestaña 2 la segunda pestaña) y -1 siendo la activa anteriormente
#: tabulador y cualquier número mayor que el último tabulador siendo el último tabulador

#:     map ctrl+alt+1 goto_tab 1
#:     map ctrl+alt+2 goto_tab 2

#: Al igual que con new_window above también puede pasar el nombre de
#: comandos arbitrarios para ejecutar cuando se usa new_tab y use
#: nueva_pestaña_con_cwd. Finalmente si desea que la nueva pestaña se abra junto a
#: la pestaña actual en lugar de al final de la lista de pestañas use

#: map ctrl+t new_tab !neighbor [optional cmd to run]

#: }}}

#: Gestión de diseño {{{

#: Siguiente diseño

map kitty_mod+l next_layout


#: También puede crear accesos directos para cambiar a diseños específicos

#:     map ctrl+alt+t goto_layout tall
#:     map ctrl+alt+s goto_layout stack

#: Del mismo modo para volver al diseño anterior

#:    map ctrl+alt+p last_used_layout

#: También hay una función de cambio de diseño que cambia al diseño con nombre
#: o vuelve al diseño anterior si está en el diseño con nombre. Útil para "acercar"
#: temporalmente la ventana activa cambiando al diseño de la apilado

map ctrl+shift+z toggle_layout stack

#: }}}

#: Tamaños de fuente {{{

#: puede cambiar el tamaño de fuente para todas las ventanas de kitty
#: OS de nivel superior a la vez o solo la actual

#: Aumenta el tamaño de la fuente

map kitty_mod+equal  change_font_size all +2.0
map kitty_mod+plus   change_font_size all +2.0
map kitty_mod+kp_add change_font_size all +2.0
map cmd+plus         change_font_size all +2.0
map cmd+equal        change_font_size all +2.0
map shift+cmd+equal  change_font_size all +2.0

#: Disminuir el tamaño de fuente

map kitty_mod+minus       change_font_size all -2.0
map kitty_mod+kp_subtract change_font_size all -2.0
map cmd+minus             change_font_size all -2.0
map shift+cmd+minus       change_font_size all -2.0

#: Restablecer tamaño de fuente

map kitty_mod+backspace change_font_size all 0
map cmd+0               change_font_size all 0


#: Para configurar accesos directos para tamaños de fuente específicos

#: map kitty_mod+f6 change_font_size all 10.0

#: para configurar accesos directos para cambiar solo el
#: tamaño de fuente de la ventana actual del OS

#:     map kitty_mod+f6 change_font_size current 10.0

#: }}}

#: Seleccionar y actuar sobre el texto visible {{{

#: use hints kitten para seleccionar texto y páselo a un
#: programa externo o insértelo en la terminal o cópielo en el portapapeles

#: Abrir URL

map kitty_mod+e open_url_with_hints

#:: Abra una URL actualmente visible usando el teclado. El programa utilizado
#:: para abrir la URL se especifica en open_url_with.

#: Insertar ruta seleccionada

map kitty_mod+p>f kitten hints --type path --program -

#:: Seleccione una ruta/nombre de archivo e insértelo en la terminal
#:: Útil por ejemplo para ejecutar comandos git en una salida de nombre
#:: de archivo desde un comando git anterior

#: Abrir la ruta seleccionada

map kitty_mod+p>shift+f kitten hints --type path

#: Seleccione una ruta/nombre de archivo y ábralo con
#: el programa abierto predeterminado

#: Insertar línea seleccionada

map kitty_mod+p>l kitten hints --type line --program -

#:: Seleccione una línea de texto e insértela en la terminal
#:: Úselo para la salida de cosas como: ls -1

#: Insertar palabra seleccionada

map kitty_mod+p>w kitten hints --type word --program -

#:: Seleccione palabras e insértelas en la terminal.

#: Insertar hash seleccionado

map kitty_mod+p>h kitten hints --type hash --program -

#:: Seleccione algo que parezca un hash e insértelo en el
#:: Terminal Útil con git que usa hash sha1 para identificar
#:: commits

#: abre el archivo seleccionado en la línea seleccionada

map kitty_mod+p>n kitten hints --type linenum

#:: Seleccione algo que se parezca a filename:linenum y ábralo en
#:: vim en el número de línea especificado

#: abre el hipervínculo seleccionado

map kitty_mod+p>y kitten hints --type hyperlink

#:: Seleccione un hipervínculo (es decir, una URL que ha sido marcada como tal por
#:: el programa terminal, por ejemplo, por ls --hyperlink=auto)

#: El hints kitten tiene muchos más modos de funcionamiento que puedes mapear
#: a diferentes accesos directos. Para obtener una descripción completa, consulte kittens/hints

#: }}}

#: misceláneo {{{

#: Alternar pantalla completa

map kitty_mod+f11 toggle_fullscreen
map ctrl+cmd+f    toggle_fullscreen

#: Alternar maximizado

map kitty_mod+f10 toggle_maximized

#: Alternar la entrada de teclado segura de macOS

map opt+cmd+s toggle_macos_secure_keyboard_entry

#: Entrada Unicode

map kitty_mod+u    kitten unicode_input
map ctrl+cmd+space kitten unicode_input

#: Editar archivo de configuración

map kitty_mod+f2 edit_config_file
map cmd+,        edit_config_file

#: Abre el shell de comandos de Kitty

map kitty_mod+escape kitty_shell window

#:: Abre el shell de Kitty en una nueva ventana/pestaña/superposición/os_window
#:: para controlar a Kitty usando comandos

#: aumentar la opacidad del fondo

map kitty_mod+a>m set_background_opacity +0.1

#: Disminuir la opacidad del fondo

map kitty_mod+a>l set_background_opacity -0.1

#: hacer que el fondo sea completamente opaco

map kitty_mod+a>1 set_background_opacity 1

#: restablecer la opacidad del fondo

map kitty_mod+a>d set_background_opacity default

#: Restablecer el terminal

map kitty_mod+delete clear_terminal reset active
map opt+cmd+r        clear_terminal reset active

#:: Puede crear accesos directos para borrar/restablecer la terminal Por ejemplo

#:: # Reiniciar la terminal
#:: map kitty_mod+f9 clear_terminal reinicio activo

#:: # Borrar la pantalla del terminal borrando todo el contenido
#:: map kitty_mod+f10 clear_terminal limpio activo

#:: # Limpiar el scrollback del terminal borrándolo
#:: map kitty_mod+f11 clear_terminal scrollback activo

#:: # Desplazar el contenido de la pantalla en el desplazamiento hacia atrás
#:: map kitty_mod+f12 clear_terminal desplazamiento activo

#:: Si desea operar en todas las ventanas en lugar de solo en la actual
#::  use all en lugar de active También es posible reasignar Ctrl+L para
#:: desplazar el contenido de la pantalla actual al búfer de desplazamiento
#::  hacia atrás y borrar la pantalla en lugar de simplemente borrar la pantalla
#:: por ejemplo, para ZSH agregue lo siguiente a ~/.zshrc:

#::  .. code-block:: sh

#::      scroll-and-clear-screen() {
#::          printf '\n%.0s' {1..$LINES}
#::          zle clear-screen
#::      }
#::      zle -N scroll-and-clear-screen
#::      bindkey '^l' scroll-and-clear-screen

#: Borrar hasta la línea del cursor

map cmd+k clear_terminal to_cursor active

#: Recargar kitty.conf

map kitty_mod+f5 load_config_file
map ctrl+cmd+,   load_config_file

#:: Recargar kitty.conf aplicando cualquier cambio desde
#:: la última vez que se cargó Tenga en cuenta que algunas
#:: configuraciones no se pueden cambiar dinámicamente y
#:: requieren un reinicio completo de kitty También puede
#:: asignar una combinación de teclas para cargar un archivo
#:: de configuración diferente por ejemplo

#::      map f5 load_config /path/to/alternative/kitty.conf

#:: Tenga en cuenta que todas las configuraciones del
#:: kitty.conf original se descartan, en otras palabras
#:: las nuevas configuraciones de conf *reemplazan* a las antiguas.

#: Configuración de kitty de depuración

map kitty_mod+f6 debug_config
map opt+cmd+,    debug_config

#:: Mostrar detalles sobre exactamente qué configuración está ejecutando Kitty
#:: con y su entorno anfitrión. Útil para problemas de depuración.
#:  enviar texto arbitrario al presionar teclas por ejemplo
#:  map ctrl+shift+alt+h send_text
#:: todo Hello World Puedes decirle a Kitty que envíe texto codificado arbitrariamente (UTF-8) al
#:: programa cliente al presionar las teclas de acceso directo especificadas Por ejemplo::
#:: map ctrl+alt+a send_text all Special text

#:: Esto enviará "Texto especial" cuando presione la tecla ctrl+alt+a
#:: El texto que se enviará es un literal de cadena de python, por lo que
#:: puede usar escapes como \x1b para enviar códigos de control o \u21fb para
#:: envíe caracteres Unicode (o puede ingresar el caracteres Unicode
#:: directamente como texto UTF-8) El primer argumento a send_text son los
#:: modos de teclado en los que activar el atajo. Los valores posibles
#:: son normal o application o kitty o una combinación de ellos separados por
#:: comas La palabra clave especial all significa todos los modos Los modos normal
#:: y aplicación se refieren a el modo de tecla de cursor DECCKM para terminales
#:: y kitty se refiere al protocolo de teclado extendido especial kitty
#:: Otro ejemplo que genera una palabra y luego mueve el cursor a el inicio de la
#:: línea (lo mismo que presionar la tecla Inicio)
#:: map ctrl+alt+a send_text normal Word\x1b[H
#:: map ctrl+alt+a send_text application Word\x1bOH
