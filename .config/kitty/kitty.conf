#: Fonts {{{

#: PARA TENER UNA LISTA DE FUENTES SOPORTADAS  USE `kitty +list-fonts`

font_family      Hack Nerd Fonts
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 19.0

force_ltr no

adjust_line_height  0
adjust_column_width 0

adjust_baseline 0

symbol_map

narrow_symbols

disable_ligatures never

font_features

#: E.g. font_features none
#: font_features UnifontMedium +isol -medi -fina -init

box_drawing_scale 0.001, 1, 1.5, 2

#: PERSONALIZACION DEL CURSOR  {{{

cursor #3374ff
#: cursor color

cursor_text_color #fed371

#: Elija el color del texto debajo del cursor

cursor_shape beam
#: La forma del cursor puede ser una de (bloque, viga, subrayado)

cursor_beam_thickness 1.5

#: Define el grosor del cursor del haz (en pts)

cursor_underline_thickness 2.0

#: Define el grosor del cursor subrayado (en pts)

cursor_blink_interval 0.4

#: El intervalo (en segundos) en el que parpadea el cursor Poner a cero
#: para deshabilitar el parpadeo

cursor_stop_blinking_after 0.0

#: deja de parpadear el cursor después del número especificado de segundos de
#: inactividad del teclado. Establézcalo en cero para que nunca deje de parpadear

#: DESPLAZARSE HACIA ATRÁS {{{

scrollback_lines 2000

#: número de líneas de historial que se mantendrán en la memoria para desplazarse hacia atrás

scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

scrollback_pager_history_size 0

scrollback_fill_enlarged_window no

wheel_scroll_multiplier 5.0

wheel_scroll_min_lines 1

touch_scroll_multiplier 1.0

#: Mouse {{{

mouse_hide_wait 3.0
url_color #0087bd
url_style curly
open_url_with default
url_prefixes file ftp ftps gemini git gopher http https irc ircs kitty mailto news sftp ssh
detect_urls yes
url_excluded_characters
copy_on_select yes
map f1 copy_to_buffer a
map f2 paste_from_buffer a
map f3 copy_to_buffer b
map f4 paste_from_buffer b
#: elimine los espacios al final de las líneas al copiar al portapapeles. A
strip_trailing_spaces always
#: Caracteres considerados parte de una palabra al hacer doble clic.
select_by_word_characters @-./_~?&=%+#
click_interval -1.0
#: El intervalo entre clics sucesivos para detectar doble/triple
#: clics (en segundos). Los números negativos usarán el valor predeterminado del sistema
#: en su lugar, si está disponible, o recurra a 0.5.

#: establece la ventana activa en la ventana debajo del mouse al mover el mouse
focus_follows_mouse no
pointer_shape_when_grabbed arrow
default_pointer_shape beam
pointer_shape_when_dragging beam
#: Puedes hacer que Kitty elimine todas las acciones del mouse vistas hasta este punto.
clear_all_mouse_actions no
mouse_map left click ungrabbed mouse_handle_click selection link prompt
mouse_map shift+left click grabbed,ungrabbed mouse_handle_click selection link prompt
mouse_map ctrl+shift+left release grabbed,ungrabbed mouse_handle_click link
mouse_map ctrl+shift+left press grabbed discard_event
mouse_map middle release ungrabbed paste_from_selection
mouse_map left press ungrabbed mouse_selection normal
mouse_map ctrl+alt+left press ungrabbed mouse_selection rectangle
mouse_map left doublepress ungrabbed mouse_selection word
mouse_map left triplepress ungrabbed mouse_selection line
mouse_map ctrl+alt+left triplepress ungrabbed mouse_selection line_from_point
mouse_map right press ungrabbed mouse_selection extend
mouse_map shift+middle release ungrabbed,grabbed paste_selection
mouse_map shift+middle press grabbed discard_event
mouse_map shift+left press ungrabbed,grabbed mouse_selection normal
mouse_map ctrl+shift+alt+left press ungrabbed,grabbed mouse_selection rectangle
mouse_map shift+left doublepress ungrabbed,grabbed mouse_selection word
mouse_map shift+left triplepress ungrabbed,grabbed mouse_selection line
mouse_map ctrl+shift+alt+left triplepress ungrabbed,grabbed mouse_selection line_from_point
mouse_map shift+right press ungrabbed,grabbed mouse_selection extend
mouse_map ctrl+shift+right press ungrabbed mouse_show_command_output

#: LA OPTIMIZACIÓN DEL RENDIMIENTO {{{

repaint_delay 10
input_delay 3
sync_to_monitor yes

#: CAMPANA EN TERMINAL {{{

enable_audio_bell no
visual_bell_duration 0.0
visual_bell_color none
window_alert_on_bell yes
bell_on_tab "🔔 "
command_on_bell none
bell_path none

#: DISEÑO DE VENTANA {{{

remember_window_size  yes
initial_window_width  640
initial_window_height 400
enabled_layouts *
window_resize_step_cells 2
window_resize_step_lines 2
window_border_width 0.5pt
draw_minimal_borders yes
window_margin_width 0
single_window_margin_width -1
window_padding_width 0
placement_strategy center
active_border_color #00ff00
inactive_border_color #cccccc
bell_border_color #ff5a00
inactive_text_alpha 1.0
hide_window_decorations no
window_logo_path none
window_logo_position bottom-right
window_logo_alpha 0.5
resize_debounce_time 0.1
resize_draw_strategy static
resize_in_steps no
visual_window_select_characters 1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZ
confirm_os_window_close 0

#: BARRA DE PESTAÑAS {{{
#: en qué borde mostrar la barra de pestañas, arriba o abajo
tab_bar_edge bottom
#: El margen a la izquierda y derecha de la barra de pestañas (en pts)
tab_bar_margin_width 0.0
tab_bar_margin_height 0.0 0.0
tab_bar_style fade
#: fade
#:     Each tab's edges fade into the background color (see tab_fade)
#: slant
#:     Tabs look like the tabs in a physical file
#: separator
#:     Tabs are separated by a configurable separator (see tab_separator)
#: powerline
#:     Tabs are shown as a continuous line with "fancy" separators
#:     (see tab_powerline_style)
#: custom
#:     A user-supplied Python function called draw_tab is loaded from the file
#:     tab_bar.py in the kitty config directory. For examples of how to
#:     write such a function, see the functions named draw_tab_with_* in
#:     kitty's source code: kitty/tab_bar.py. See also
#:     this discussion https://github.com/kovidgoyal/kitty/discussions/4447
#:     for examples from kitty users.
#: hidden
#:     The tab bar is hidden. If you use this, you might want to create a
#:     mapping for the https://sw.kovidgoyal.net/kitty/actions/#select-tab
#:     action which presents you with a list of tabs and allows for easy
#:     switching to a tab.

#: La alineación horizontal de la barra de pestañas puede ser una de
#: las siguientes: izquierda,centro o derecha
tab_bar_align left
#: el número mínimo de pestañas que deben existir antes de que se abra la barra de pestañas mostrado
tab_bar_min_tabs 2
tab_switch_strategy previous
tab_fade 0.25 0.5 0.75 1
tab_separator " ┇"
tab_powerline_style angled
tab_activity_symbol none
tab_title_template "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{title}"
#: plantilla a usar para pestañas activas, si no se especifica, recurre a
#: tab_title_template.
active_tab_title_template none
active_tab_foreground   #000
active_tab_background   #eee
active_tab_font_style   bold-italic
inactive_tab_foreground #444
inactive_tab_background #999
inactive_tab_font_style normal
tab_bar_background none
tab_bar_margin_color none

#: ESQUEMA DE COLOR {{{
#: los colores de primer plano y de fondo
foreground #48cf04
background #000000
background_opacity 0.9
#: Ruta a una imagen de fondo. Debe estar en formato PNG
background_image none
background_image_layout tiled
background_image_linear no
dynamic_background_opacity no
background_tint 0.0
dim_opacity 0.75
selection_foreground #000000
selection_background #fffacd

